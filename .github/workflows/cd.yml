name: Deploy to EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: arcampos-eks-cluster
  DEPLOYMENT_NAME: node-app
  IMAGE: node-app
  NAMESPACE: node-app

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Verify Cluster Access
        run: |
          kubectl get nodes

      - name: Deploy Application
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -n $NAMESPACE

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME \
            -n $NAMESPACE --timeout=300s
    
      - name: Run smoke tests
        run: |
          EXTERNAL_IP=$(kubectl get service node-app-service -n $NAMESPACE \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          for i in {1..30}; do
            if [ ! -z "$EXTERNAL_IP" ]; then
              break
            fi
            echo "Aguardando IP externo... ($i/30)"
            sleep 10
            EXTERNAL_IP=$(kubectl get service node-app-service -n $NAMESPACE \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          done
          
          if [ -z "$EXTERNAL_IP" ]; then
            echo "ERRO: IP externo não foi atribuído"
            exit 1
          fi
          
          curl -f --max-time 10 http://$EXTERNAL_IP/health
          curl -f --max-time 10 http://$EXTERNAL_IP/api/info
          echo "Deploy realizado com sucesso!"